<!doctype html>
<html lang="ht">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="./favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="shortcut icon" href="./favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <title>Kobposh · Pong</title>
    <style>
      :root {
        --bg-0: #f4fbf6;
        --bg-1: #e5f6ea;
        --panel: rgba(255, 255, 255, 0.94);
        --line: rgba(31, 143, 76, 0.16);
        --text: #10311f;
        --muted: rgba(16, 49, 31, 0.72);
        --accent: #1f8f4c;
        --accent-dark: #166c39;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at 18% 12%, rgba(31, 143, 76, 0.13), transparent 24%),
          radial-gradient(circle at 84% 18%, rgba(31, 143, 76, 0.08), transparent 26%),
          linear-gradient(160deg, var(--bg-0), var(--bg-1));
        overflow: hidden;
        font-family: "Poppins", system-ui, sans-serif;
        color: var(--text);
      }

      .shell {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        height: max(56px, calc(56px + env(safe-area-inset-top)));
        padding-top: env(safe-area-inset-top);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding-inline: max(12px, env(safe-area-inset-left)) max(12px, env(safe-area-inset-right));
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(247, 252, 248, 0.92));
        border-bottom: 1px solid rgba(31, 143, 76, 0.12);
        color: var(--text);
        box-shadow: 0 8px 24px rgba(22, 108, 57, 0.06);
      }

      .title {
        font-size: 0.96rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: var(--text);
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 14px;
        border-radius: 10px;
        border: 1px solid rgba(31, 143, 76, 0.18);
        color: var(--text);
        text-decoration: none;
        background: rgba(31, 143, 76, 0.08);
        font-size: 0.86rem;
        font-weight: 600;
      }

      .balance-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 12px;
        border-radius: 10px;
        border: 1px solid rgba(31, 143, 76, 0.22);
        background: rgba(31, 143, 76, 0.12);
        color: var(--accent-dark);
        font-size: 0.82rem;
        font-weight: 700;
        white-space: nowrap;
      }

      .frame-wrap {
        flex: 1;
        min-height: 0;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: rgba(255, 255, 255, 0.82);
        display: block;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(16, 49, 31, 0.26);
        backdrop-filter: blur(6px);
        padding: 16px;
      }

      .overlay.active {
        display: flex;
      }

      .overlay.overlay--fullscreen {
        padding: 0;
        background: rgba(8, 26, 16, 0.94);
        backdrop-filter: blur(3px);
      }

      .overlay.overlay--fullscreen .panel {
        width: 100vw;
        height: 100vh;
        max-width: 100vw;
        border-radius: 0;
        border: 0;
        box-shadow: none;
        background: linear-gradient(180deg, #0f3d24 0%, #0b2f1c 100%);
        color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 28px 22px;
      }

      .search-shell {
        position: relative;
        width: min(620px, 100%);
        padding: 18px;
      }

      .search-shell::before {
        content: "";
        position: absolute;
        inset: 8% 12%;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(45, 212, 116, 0.2), transparent 70%);
        filter: blur(28px);
        pointer-events: none;
      }

      .search-card {
        position: relative;
        width: min(520px, 100%);
        margin: 0 auto;
        padding: 28px 22px 22px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
          linear-gradient(160deg, rgba(12, 56, 33, 0.96), rgba(7, 29, 18, 0.98));
        box-shadow:
          0 30px 60px rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        text-align: left;
      }

      .search-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(45, 212, 116, 0.14);
        border: 1px solid rgba(74, 222, 128, 0.24);
        color: #b7f7ca;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .search-pill::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #53f28f;
        box-shadow: 0 0 0 6px rgba(83, 242, 143, 0.12);
      }

      .search-actions {
        margin-top: 22px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .search-actions .stake-btn {
        min-width: 170px;
        padding: 0 18px;
      }

      .overlay.overlay--fullscreen .search-actions .stake-btn-alt {
        border-color: rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.06);
        color: #f3fff7;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .overlay.overlay--fullscreen .search-actions .stake-btn-alt:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .overlay.overlay--fullscreen .panel h3 {
        margin-top: 18px;
        font-size: clamp(1.6rem, 4vw, 2.35rem);
        line-height: 1.08;
        color: #fff;
      }

      .overlay.overlay--fullscreen .panel p {
        margin-top: 14px;
        font-size: 1.02rem;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.82);
        max-width: 46ch;
      }

      @media (max-width: 560px) {
        .search-shell {
          padding: 12px;
        }

        .search-card {
          padding: 24px 18px 18px;
          border-radius: 24px;
        }

        .search-actions {
          flex-direction: column;
        }

        .search-actions .stake-btn {
          width: 100%;
          min-width: 0;
        }
      }

      .panel {
        width: min(420px, 100%);
        border-radius: 24px;
        border: 1px solid rgba(31, 143, 76, 0.16);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(241, 251, 245, 0.96));
        color: var(--text);
        box-shadow: 0 18px 40px rgba(22, 108, 57, 0.14);
        padding: 18px;
      }

      .panel h3 {
        margin: 0;
        font-size: 1.14rem;
      }

      .panel p {
        margin: 8px 0 0;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .stake-grid {
        margin-top: 14px;
        display: grid;
        gap: 10px;
      }

      .stake-btn {
        min-height: 56px;
        border-radius: 14px;
        border: 1px solid rgba(31, 143, 76, 0.24);
        background: linear-gradient(180deg, #1f8f4c, #16733c);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 12px 24px rgba(31, 143, 76, 0.18);
      }

      .stake-btn:disabled {
        opacity: 0.62;
        cursor: not-allowed;
      }

      .stake-btn-alt {
        border: 1px solid rgba(31, 143, 76, 0.18);
        background: rgba(31, 143, 76, 0.08);
        color: var(--text);
        box-shadow: none;
      }

      .panel-note {
        min-height: 18px;
        margin-top: 10px;
        font-size: 0.82rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <a id="backLink" class="back-link" href="./index.html">Retounen</a>
        <div class="title">Pong · solo</div>
        <div id="balanceBadge" class="balance-badge">HTG: --</div>
      </header>

      <section class="frame-wrap">
        <iframe id="pongFrame" src="about:blank" title="Pong"></iframe>
      </section>
    </main>

    <div id="stakeOverlay" class="overlay active" role="dialog" aria-modal="true">
      <div class="panel">
        <h3 id="stakeHeading">Chwazi mise HTG Pong ou</h3>
        <p>Gayan an pran 1.9x an HTG. Mise a soti dirèkteman sou balans HTG ou depi pati a kòmanse.</p>
        <div class="stake-grid">
          <button type="button" class="stake-btn" data-stake="100">5 HTG · Gwo genyen 9 HTG</button>
          <button type="button" class="stake-btn" data-stake="500">25 HTG · Gwo genyen 45 HTG</button>
          <button type="button" id="refreshBalanceBtn" class="stake-btn stake-btn-alt">Rafrechi balans</button>
        </div>
        <div id="stakeNote" class="panel-note"></div>
      </div>
    </div>

    <div id="searchOverlay" class="overlay overlay--fullscreen" role="status" aria-live="polite">
      <div class="panel search-shell">
        <div class="search-card">
          <div class="search-pill">Pong matchmaking</div>
          <h3 id="searchOverlayTitle">M ap prepare pati a...</h3>
          <p id="searchOverlayCopy">M ap valide mise a epi m ap louvri match la.</p>
          <div class="search-actions">
            <button id="searchRetryBtn" type="button" class="stake-btn" style="display:none;">Chache ankò</button>
            <button id="searchHomeBtn" type="button" class="stake-btn stake-btn-alt" style="display:none;">Tounen dakey</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { auth, db, doc, getDoc, onAuthStateChanged } from "./firebase-init.js";
      import {
        getDepositFundingStatusSecure,
        startPongWagerSecure,
        touchPongWagerHeartbeatSecure,
        recordPongMatchResultSecure,
      } from "./secure-functions.js";

      const frame = document.getElementById("pongFrame");
      const backLink = document.getElementById("backLink");
      const balanceBadge = document.getElementById("balanceBadge");
      const stakeOverlay = document.getElementById("stakeOverlay");
      const searchOverlay = document.getElementById("searchOverlay");
      const searchOverlayTitle = document.getElementById("searchOverlayTitle");
      const searchOverlayCopy = document.getElementById("searchOverlayCopy");
      const searchRetryBtn = document.getElementById("searchRetryBtn");
      const searchHomeBtn = document.getElementById("searchHomeBtn");
      const stakeNote = document.getElementById("stakeNote");
      const stakeButtons = Array.from(document.querySelectorAll(".stake-btn[data-stake]"));
      const refreshBalanceBtn = document.getElementById("refreshBalanceBtn");

      const VALID_AI = new Set(["soft", "normal", "ultra"]);
      const requestedFundingCurrency = "htg";
      const HEARTBEAT_MS = 12000;
      const PONG_FORFEIT_QUEUE_KEY = "pong_v2_forfeit_queue";
      const PONG_ACTIVE_WAGER_KEY = "pong_v2_active_wager";

      let currentUid = "";
      let activeWager = null;
      let heartbeatTimer = null;
      let resolvedProfile = "ultra";
      let pendingAutoStake = 0;
      let lastSelectedStakeDoes = 0;
      let launchBusy = false;
      let backNavigationInProgress = false;
      let heartbeatFailures = 0;
      let forcedDisconnectLoss = false;
      let pendingSettlementPromise = null;
      const recordedMatchIds = new Set();
      const NO_PLAYER_AVAILABLE_CHANCE = 0.38;

      function safeNumber(value, fallback = 0) {
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
      }

      function safeInt(value, fallback = 0) {
        return Math.max(0, Math.trunc(safeNumber(value, fallback)));
      }

      function formatHtg(value) {
        return `${safeInt(value).toLocaleString("fr-FR")} HTG`;
      }

      function doesToHtgAmount(does) {
        return Math.floor(safeInt(does) / 20);
      }

      function renderBalance(playableHtg = null) {
        const parsed = Number(playableHtg);
        if (!Number.isFinite(parsed)) {
          balanceBadge.textContent = "HTG: --";
          return;
        }
        balanceBadge.textContent = `HTG: ${safeInt(parsed).toLocaleString("fr-FR")}`;
      }

      async function refreshBalance() {
        if (!currentUid) {
          renderBalance(null);
          return null;
        }
        try {
          const funding = await getDepositFundingStatusSecure();
          renderBalance(funding?.playableHtg);
          return funding;
        } catch (error) {
          console.warn("[PONG_V2] balance refresh failed", error);
          return null;
        }
      }

      async function resolveBackendActiveSessionId(uid = "") {
        const safeUid = String(uid || currentUid || auth.currentUser?.uid || "").trim();
        if (!safeUid) return "";
        try {
          const snap = await getDoc(doc(db, "clients", safeUid));
          const data = snap.exists() ? (snap.data() || {}) : {};
          const wager = data?.pongWagerState && typeof data.pongWagerState === "object"
            ? data.pongWagerState
            : {};
          const status = String(wager.status || "").trim().toLowerCase();
          const sessionId = String(wager.sessionId || "").trim();
          return status === "active" ? sessionId : "";
        } catch (error) {
          console.warn("[PONG_V2] resolve backend active session failed", error);
          return "";
        }
      }

      function setStakeUiBusy(busy, note = "") {
        launchBusy = !!busy;
        stakeButtons.forEach((btn) => {
          btn.disabled = !!busy;
        });
        if (refreshBalanceBtn) refreshBalanceBtn.disabled = !!busy;
        if (stakeNote) stakeNote.textContent = String(note || "");
      }

      function setSearchOverlayState(titleText = "", copyText = "", options = {}) {
        const {
          showRetry = false,
          showHome = false,
          retryLabel = "Chache ankò",
        } = options || {};
        if (searchOverlayTitle) searchOverlayTitle.textContent = titleText || "M ap prepare pati a...";
        if (searchOverlayCopy) searchOverlayCopy.textContent = copyText || "Tanpri tann yon ti moman.";
        if (searchRetryBtn) {
          searchRetryBtn.textContent = String(retryLabel || "Chache ankò");
          searchRetryBtn.style.display = showRetry ? "inline-flex" : "none";
        }
        if (searchHomeBtn) {
          searchHomeBtn.style.display = showHome ? "inline-flex" : "none";
        }
      }

      function sleep(ms = 0) {
        return new Promise((resolve) => {
          window.setTimeout(resolve, Math.max(0, safeInt(ms)));
        });
      }

      function shouldShowNoPlayerAvailable() {
        return Math.random() < NO_PLAYER_AVAILABLE_CHANCE;
      }

      async function maybeShowNoPlayerAvailable() {
        if (!shouldShowNoPlayerAvailable()) return false;
        const delayMs = 900 + Math.floor(Math.random() * 1400);
        await sleep(delayMs);
        setSearchOverlayState(
          "Pa gen jwe ki disponib pou kounye a",
          "Ou ka tounen sou paj dakey la oswa eseye chache yon jwe ankò.",
          { showRetry: true, showHome: true, retryLabel: "Chache ankò" }
        );
        setStakeUiBusy(false, "Pa gen jwe ki disponib pou kounye a.");
        stakeOverlay.classList.remove("active");
        searchOverlay.classList.add("active");
        return true;
      }

      function readForfeitQueue() {
        try {
          const raw = window.localStorage.getItem(PONG_FORFEIT_QUEUE_KEY);
          const parsed = JSON.parse(raw || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch (_) {
          return [];
        }
      }

      function writeForfeitQueue(items = []) {
        try {
          const normalized = Array.isArray(items) ? items : [];
          if (normalized.length > 0) {
            window.localStorage.setItem(PONG_FORFEIT_QUEUE_KEY, JSON.stringify(normalized.slice(0, 12)));
          } else {
            window.localStorage.removeItem(PONG_FORFEIT_QUEUE_KEY);
          }
        } catch (_) {}
      }

      function enqueueForfeit(item = {}) {
        const sessionId = String(item.sessionId || "").trim();
        const uid = String(item.uid || "").trim();
        if (!uid || !sessionId) return;
        const existing = readForfeitQueue().filter((entry) => String(entry?.sessionId || "").trim() !== sessionId);
        existing.unshift({
          uid,
          sessionId,
          aiProfile: VALID_AI.has(String(item.aiProfile || "").trim().toLowerCase())
            ? String(item.aiProfile || "").trim().toLowerCase()
            : "ultra",
          stakeDoes: safeInt(item.stakeDoes),
          reason: String(item.reason || "forfeit"),
          createdAtMs: Date.now(),
        });
        writeForfeitQueue(existing);
      }

      function readStoredActiveWager() {
        try {
          const raw = window.localStorage.getItem(PONG_ACTIVE_WAGER_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : null;
        } catch (_) {
          return null;
        }
      }

      function setActiveWager(nextValue = null) {
        activeWager = nextValue && typeof nextValue === "object" ? { ...nextValue } : null;
        if (activeWager) {
          heartbeatFailures = 0;
          forcedDisconnectLoss = false;
        } else {
          heartbeatFailures = 0;
        }
        try {
          if (activeWager) {
            window.localStorage.setItem(PONG_ACTIVE_WAGER_KEY, JSON.stringify(activeWager));
          } else {
            window.localStorage.removeItem(PONG_ACTIVE_WAGER_KEY);
          }
        } catch (_) {}
        stopHeartbeat();
        if (activeWager?.sessionId) startHeartbeat();
      }

      function queueForfeitIfNeeded(reason = "forfeit") {
        if (!activeWager || activeWager.settled === true) return;
        const uid = String(currentUid || auth.currentUser?.uid || "").trim();
        const sessionId = String(activeWager?.sessionId || "").trim();
        if (!uid || !sessionId) return;
        enqueueForfeit({
          uid,
          sessionId,
          aiProfile: String(activeWager?.aiProfile || resolvedProfile || "ultra"),
          stakeDoes: safeInt(activeWager?.stakeDoes),
          reason,
        });
        setActiveWager(null);
      }

      function forceLoseForConnectivity(reason = "offline") {
        if (forcedDisconnectLoss) return;
        if (!activeWager || !String(activeWager?.sessionId || "").trim()) return;
        forcedDisconnectLoss = true;
        stopHeartbeat();
        queueForfeitIfNeeded(reason);
        frame.src = "about:blank";
        searchOverlay?.classList.add("active");
        stakeOverlay?.classList.remove("active");
        setSearchOverlayState(
          "Koneksyon an koupe",
          "Rezo a koupe oswa two fèb. Nou konte sa menm jan ak si ou te peze Retounen.",
          false
        );
        if (stakeNote) {
          stakeNote.textContent = "Pati a fini kòm abandon paske koneksyon an pa estab.";
        }
      }

      async function sendHeartbeat() {
        const sessionId = String(activeWager?.sessionId || "").trim();
        if (!sessionId) return;
        if (navigator.onLine === false) {
          forceLoseForConnectivity("offline");
          return;
        }
        try {
          const result = await touchPongWagerHeartbeatSecure({ sessionId });
          heartbeatFailures = 0;
          if (result?.active === false) {
            setActiveWager(null);
          }
        } catch (error) {
          console.warn("[PONG_V2] heartbeat failed", error);
          heartbeatFailures += 1;
          if (heartbeatFailures >= 2) {
            forceLoseForConnectivity("heartbeat_failed");
          }
        }
      }

      function startHeartbeat() {
        stopHeartbeat();
        if (!String(activeWager?.sessionId || "").trim()) return;
        heartbeatTimer = window.setInterval(() => {
          void sendHeartbeat();
        }, HEARTBEAT_MS);
        void sendHeartbeat();
      }

      function stopHeartbeat() {
        if (!heartbeatTimer) return;
        window.clearInterval(heartbeatTimer);
        heartbeatTimer = null;
      }

      function openGameFrame(aiProfile = "ultra") {
        const safeProfile = VALID_AI.has(String(aiProfile || "").trim().toLowerCase())
          ? String(aiProfile || "").trim().toLowerCase()
          : "ultra";
        const url = new URL("./Pong-Game-main/index.html", window.location.href);
        url.searchParams.set("aiProfile", safeProfile);
        frame.src = url.toString();
      }

      async function startWagerAndLaunch(stakeDoes, retryCount = 0) {
        if (!currentUid) {
          window.location.href = "./index.html?auth=login";
          return;
        }
        if (launchBusy) return;
        pendingAutoStake = safeInt(stakeDoes);
        lastSelectedStakeDoes = safeInt(stakeDoes);
        setStakeUiBusy(true, "M ap valide mise a...");
        stakeOverlay.classList.remove("active");
        searchOverlay.classList.add("active");
        setSearchOverlayState(
          "M ap chache yon jwe...",
          "Tanpri tann, m ap verifye si gen yon jwe ki disponib kounye a.",
          { showRetry: false, showHome: false }
        );
        try {
          if (await maybeShowNoPlayerAvailable()) {
            return;
          }
          setSearchOverlayState(
            "M ap prepare pati a...",
            "M ap valide mise a epi m ap louvri match la.",
            { showRetry: false, showHome: false }
          );
          await flushForfeitQueue(currentUid);
          const result = await startPongWagerSecure({
            stakeDoes: safeInt(stakeDoes),
            fundingCurrency: requestedFundingCurrency,
          });
          const sessionId = String(result?.sessionId || "").trim();
          if (!sessionId) throw new Error("Session invalide");
          renderBalance(Number(result?.playableHtg ?? 0));
          const serverAiProfile = String(result?.aiProfile || "").trim().toLowerCase();
          resolvedProfile = VALID_AI.has(serverAiProfile) ? serverAiProfile : "ultra";
          setActiveWager({
            sessionId,
            stakeDoes: safeInt(stakeDoes),
            stakeHtg: safeInt(result?.stakeHtg),
            rewardHtg: safeInt(result?.rewardAmountHtg),
            fundingCurrency: "htg",
            aiProfile: resolvedProfile,
            startedAtMs: Date.now(),
            settled: false,
          });
          await refreshBalance();
          stakeOverlay.classList.remove("active");
          searchOverlay.classList.remove("active");
          openGameFrame(resolvedProfile);
          setStakeUiBusy(false, "");
        } catch (error) {
          console.error("[PONG_V2] start wager failed", error);
          const rawMessage = String(error?.message || "");
          const message = rawMessage.toLowerCase();
          let uiMessage = "Nou pa rive komanse pati Pong la.";
          const isActiveSessionError =
            message.includes("deja en cours")
            || message.includes("already")
            || message.includes("active session")
            || String(error?.details?.code || "").toLowerCase().includes("active");
          if (isActiveSessionError && retryCount < 1) {
            const activeSessionId = String(
              error?.details?.sessionId
              || activeWager?.sessionId
              || readStoredActiveWager()?.sessionId
              || ""
            ).trim();
            const sessionIdToForfeit = activeSessionId || await resolveBackendActiveSessionId(currentUid);
            if (sessionIdToForfeit) {
              try {
                await recordPongMatchResultSecure({
                  matchId: `forfeit_${sessionIdToForfeit}`,
                  sessionId: sessionIdToForfeit,
                  aiProfile: String(activeWager?.aiProfile || resolvedProfile || "ultra"),
                  winner: "ai",
                  leftScore: 0,
                  rightScore: 3,
                  reason: "auto_forfeit_active_session",
                });
                setActiveWager(null);
                await flushForfeitQueue(currentUid);
                await refreshBalance();
                await startWagerAndLaunch(stakeDoes, retryCount + 1);
                return;
              } catch (forfeitError) {
                console.warn("[PONG_V2] auto forfeit active session failed", forfeitError);
              }
            }
          }
          if (message.includes("insuffisant")) {
            uiMessage = "Pa gen ase HTG nan kont lan.";
          } else if (isActiveSessionError) {
            uiMessage = "Gen yon sesyon Pong ki poko fini oswa ki fenk kòmanse.";
          }
          setSearchOverlayState("Nou pa rive louvri match la", uiMessage, {
            showRetry: true,
            showHome: true,
            retryLabel: "Chache ankò",
          });
          setStakeUiBusy(false, uiMessage);
        }
      }

      async function settleMatchResult(payload = {}, reason = "match_end") {
        const uid = String(currentUid || auth.currentUser?.uid || "").trim();
        if (!uid) return;
        const matchId = String(payload?.matchId || "").trim();
        if (!matchId || recordedMatchIds.has(matchId)) return;
        recordedMatchIds.add(matchId);
        const aiProfile = VALID_AI.has(String(payload?.aiProfile || "").toLowerCase())
          ? String(payload.aiProfile).toLowerCase()
          : resolvedProfile;
        const leftScore = safeInt(payload?.leftScore);
        const rightScore = safeInt(payload?.rightScore);
        const winner = payload?.winner === "user" ? "user" : "ai";
        const sessionId = String(activeWager?.sessionId || payload?.sessionId || "").trim();
        try {
          await recordPongMatchResultSecure({
            matchId,
            sessionId,
            aiProfile,
            leftScore,
            rightScore,
            winner,
            reason,
          });
        } catch (error) {
          recordedMatchIds.delete(matchId);
          console.warn("[PONG_V2] match settle failed", error);
          if (sessionId) {
            enqueueForfeit({
              uid,
              sessionId,
              aiProfile,
              stakeDoes: safeInt(activeWager?.stakeDoes),
              reason: "sync_retry",
            });
          }
        } finally {
          setActiveWager(null);
          await refreshBalance();
        }
      }

      async function flushForfeitQueue(uid = "") {
        const safeUid = String(uid || currentUid || "").trim();
        if (!safeUid || navigator.onLine === false) return;
        const queue = readForfeitQueue();
        if (!queue.length) return;
        const pending = [];
        for (const entry of queue) {
          const entryUid = String(entry?.uid || "").trim();
          if (entryUid && entryUid !== safeUid) {
            pending.push(entry);
            continue;
          }
          const sessionId = String(entry?.sessionId || "").trim();
          if (!sessionId) continue;
          try {
            await recordPongMatchResultSecure({
              matchId: `forfeit_${sessionId}`,
              sessionId,
              aiProfile: String(entry?.aiProfile || resolvedProfile || "ultra"),
              winner: "ai",
              leftScore: 0,
              rightScore: 3,
              reason: String(entry?.reason || "forfeit"),
            });
          } catch (_) {
            pending.push(entry);
          }
        }
        writeForfeitQueue(pending);
      }

      async function handleBackNavigation(targetHref) {
        if (backNavigationInProgress) return;
        backNavigationInProgress = true;
        if (activeWager?.sessionId) {
          try {
            await recordPongMatchResultSecure({
              matchId: `forfeit_${String(activeWager.sessionId).trim()}`,
              sessionId: String(activeWager.sessionId).trim(),
              aiProfile: String(activeWager.aiProfile || resolvedProfile || "ultra"),
              winner: "ai",
              leftScore: 0,
              rightScore: 3,
              reason: "quit",
            });
            setActiveWager(null);
            await refreshBalance();
          } catch (error) {
            console.warn("[PONG_V2] quit forfeit failed", error);
            queueForfeitIfNeeded("quit");
            if (currentUid && navigator.onLine !== false) {
              await flushForfeitQueue(currentUid);
            }
          }
        }
        window.location.href = targetHref;
      }

      stakeButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const stakeDoes = safeInt(btn.getAttribute("data-stake"));
          void startWagerAndLaunch(stakeDoes);
        });
      });

      refreshBalanceBtn?.addEventListener("click", () => {
        void refreshBalance();
      });

      searchRetryBtn?.addEventListener("click", () => {
        if (pendingAutoStake > 0) {
          void startWagerAndLaunch(pendingAutoStake);
          return;
        }
        searchOverlay.classList.remove("active");
        stakeOverlay.classList.add("active");
      });

      searchHomeBtn?.addEventListener("click", () => {
        const href = String(backLink?.getAttribute("href") || "./index.html");
        window.location.href = href;
      });

      window.addEventListener("message", (event) => {
        if (event.origin !== window.location.origin) return;
        const data = event?.data;
        if (!data || typeof data !== "object") return;
        if (data.type === "pong:playAgain") {
          Promise.resolve(pendingSettlementPromise)
            .catch(() => {})
            .finally(() => {
              frame.src = "about:blank";
              const replayStakeDoes = safeInt(lastSelectedStakeDoes || pendingAutoStake);
              if (replayStakeDoes > 0) {
                void startWagerAndLaunch(replayStakeDoes);
                return;
              }
              stakeOverlay.classList.add("active");
              searchOverlay.classList.remove("active");
            });
          return;
        }
        if (data.type === "pong:returnHome") {
          const href = String(backLink?.getAttribute("href") || "./index.html");
          Promise.resolve(pendingSettlementPromise)
            .catch(() => {})
            .finally(async () => {
              await refreshBalance();
              window.location.href = href;
            });
          return;
        }
        if (data.type !== "pong:matchResult") return;
        pendingSettlementPromise = settleMatchResult(data.payload || {}, "match_end")
          .catch((error) => {
            console.warn("[PONG_V2] pending settlement failed", error);
          })
          .finally(() => {
            pendingSettlementPromise = null;
          });
      });

      window.addEventListener("xchangeUpdated", () => {
        if (!currentUid) return;
        void refreshBalance();
      });

      window.addEventListener("userBalanceUpdated", () => {
        if (!currentUid) return;
        void refreshBalance();
      });

      backLink?.addEventListener("click", (event) => {
        event.preventDefault();
        const href = String(backLink.getAttribute("href") || "./index.html");
        void handleBackNavigation(href);
      });

      try {
        const historyState = window.history.state && typeof window.history.state === "object"
          ? window.history.state
          : {};
        if (!historyState.__pongBackGuard) {
          window.history.replaceState({ ...historyState, __pongBackGuardRoot: true }, "", window.location.href);
          window.history.pushState({ ...historyState, __pongBackGuard: true }, "", window.location.href);
        }
      } catch (_) {}

      window.addEventListener("popstate", () => {
        if (backNavigationInProgress) return;
        const href = String(backLink?.getAttribute("href") || "./index.html");
        void handleBackNavigation(href);
      });

      window.addEventListener("offline", () => {
        forceLoseForConnectivity("offline");
      });

      window.addEventListener("pagehide", () => {
        queueForfeitIfNeeded("pagehide");
      });

      window.addEventListener("beforeunload", () => {
        queueForfeitIfNeeded("beforeunload");
      });

      onAuthStateChanged(auth, (user) => {
        currentUid = String(user?.uid || "").trim();
        if (!currentUid) {
          renderBalance(null);
          stakeOverlay.classList.add("active");
          setStakeUiBusy(false, "Ou dwe konekte pou jwe Pong.");
          return;
        }
        setStakeUiBusy(false, "");
        const stale = readStoredActiveWager();
        if (stale && String(stale?.sessionId || "").trim()) {
          enqueueForfeit({
            uid: currentUid,
            sessionId: String(stale.sessionId || "").trim(),
            aiProfile: String(stale.aiProfile || resolvedProfile || "ultra"),
            stakeDoes: safeInt(stale?.stakeDoes),
            reason: "session_resume_forfeit",
          });
          setActiveWager(null);
        }
        void flushForfeitQueue(currentUid).then(() => refreshBalance());
      });
    </script>
  </body>
</html>
